<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Best Mountain | Sustainable Raw Materials</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Best Mountain provides sustainable, high-quality raw materials for environmentally responsible industries. Trusted sourcing, ethical supply chains, and global reach."
    />
    <meta
      name="keywords"
      content="Best Mountain, sustainable raw materials, eco-friendly materials, ethical sourcing, green supply chain"
    />
    <meta name="author" content="Best Mountain" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.bm-materials.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/BM-favicon.ico" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Best Mountain | Sustainable Raw Materials" />
    <meta
      property="og:description"
      content="Sustainable, ethically sourced raw materials for a greener future."
    />
    <meta property="og:url" content="https://www.bm-materials.com/" />
    <meta property="og:site_name" content="Best Mountain" />
    <meta property="og:image" content="https://www.bm-materials.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Best Mountain | Sustainable Raw Materials" />
    <meta
      name="twitter:description"
      content="Sustainable, ethically sourced raw materials for a greener future."
    />
    <meta name="twitter:image" content="https://www.bm-materials.com/og-image.jpg" />

    <!-- Apple / Mobile -->
    <meta name="apple-mobile-web-app-title" content="Best Mountain" />
    <meta name="theme-color" content="#0f3d2e" />

    <!-- Performance (optional but good) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- App Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
